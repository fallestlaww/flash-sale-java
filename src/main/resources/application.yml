server:
  port: 8080

spring:
  application:
    name: sale-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/flashsale}
    username: postgres
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

# --- Self-Redis (ephemeral/hot state, port :8840) ---
selfredis:
  base-url: ${SELFREDIS_BASE_URL:http://localhost:8840}
  connect-timeout: 2s
  read-timeout: 2s

cache:
  event:
    ttl-seconds: 60
  order:
    ttl-seconds: 30
hold:
  seconds: 600
idempotency:
  ttl-seconds: 86400
reconciler:
  period-ms: 15000
  batch-size: 100
ratelimit:
  # Fixed-window checkout limit per user: `limit` requests per `window-seconds`.
  limit: 20
  window-seconds: 60

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.example.flashsale: DEBUG
